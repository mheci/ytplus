name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-userscript:
    name: Validate Userscript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate JavaScript syntax
        run: |
          echo "Validating yt+.user.js syntax..."
          node --check yt+.user.js
          echo "Syntax is valid"

      - name: Validate userscript headers
        run: |
          echo "Checking required userscript headers..."
          head -80 yt+.user.js | grep -q '^// @name         YT+'
          head -80 yt+.user.js | grep -q '^// @version'
          head -80 yt+.user.js | grep -q '^// @match        https://www.youtube.com/\*'
          head -80 yt+.user.js | grep -q '^// @run-at       document-start'
          echo "Required headers present"

      - name: Basic structure check
        run: |
          head -1 yt+.user.js | grep -q '// ==UserScript=='
          tail -5 yt+.user.js | grep -q '})();'
          echo "Basic structure looks correct"

      - name: Sanity check for scope collisions
        run: |
          # The v3.0.20.0 audit class: duplicate top-level function
          # declarations must never come back (hoisting silently breaks
          # every consumer of the shadowed declaration).
          DUPS=$(grep -oE '^  function [A-Za-z0-9_$]+\(' yt+.user.js | sort | uniq -d)
          if [ -n "$DUPS" ]; then
            echo "Duplicate top-level function declarations found:"
            echo "$DUPS"
            exit 1
          fi
          echo "No top-level scope collisions"

      - name: Install dev dependencies (jsdom for the behavior suites)
        run: npm install

      - name: Run the full QA matrix
        run: node tests/run-all.js

      - name: Size sanity check
        run: |
          SIZE=$(stat -c%s yt+.user.js)
          echo "Userscript size: ${SIZE} bytes"
          if [ "$SIZE" -lt 100000 ]; then
            echo "Warning: Userscript seems unusually small"
          fi

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [validate-userscript]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "All validation jobs completed."
          if [ "${{ needs.validate-userscript.result }}" != "success" ]; then
            echo "validate-userscript failed"
            exit 1
          fi
          echo "Repository is in a healthy state."
