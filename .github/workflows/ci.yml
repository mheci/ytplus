name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Userscript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate JavaScript syntax
        run: |
          echo "Validating yt+.user.js syntax..."
          node --check yt+.user.js
          node --check yt+.meta.js
          echo "Syntax is valid"

      - name: Validate userscript headers
        run: |
          echo "Checking required userscript headers..."
          head -n 80 yt+.user.js | grep -q '^// @name         YT+'
          head -n 80 yt+.user.js | grep -q '^// @version'
          head -n 80 yt+.user.js | grep -q '^// @match        https://www.youtube.com/\*'
          head -n 80 yt+.user.js | grep -q '^// @match        https://music.youtube.com/\*'
          head -n 80 yt+.user.js | grep -q '^// @run-at       document-start'
          head -n 80 yt+.user.js | grep -q '^// @noframes'
          head -n 80 yt+.user.js | grep -q '^// @grant        GM_xmlhttpRequest'
          head -n 80 yt+.user.js | grep -q '^// @updateURL    https://github.com/mheci/ytplus/releases/latest/download/yt%2B.meta.js'
          head -n 80 yt+.user.js | grep -q '^// @downloadURL  https://github.com/mheci/ytplus/releases/latest/download/yt%2B.user.js'
          echo "Required headers present"

      - name: Basic structure check
        run: |
          head -n 1 yt+.user.js | grep -q '// ==UserScript=='
          tail -n 5 yt+.user.js | grep -q '})();'
          echo "Basic structure looks correct"

      - name: Scope collision guard
        run: |
          DUPS=$(grep -oE '^  function [A-Za-z0-9_$]+\(' yt+.user.js | sort | uniq -d || true)
          if [ -n "$DUPS" ]; then
            echo "Duplicate top-level function declarations found:"
            echo "$DUPS"
            exit 1
          fi
          echo "No top-level scope collisions"

      - name: Meta & packaging consistency
        run: |
          node - <<'NODE'
          const fs=require('fs');
          const user=fs.readFileSync('yt+.user.js','utf8');
          const meta=fs.readFileSync('yt+.meta.js','utf8');
          const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));
          const v=user.match(/^\/\/ @version\s+(\S+)/m);
          if(!v){ console.error('no @version in user.js'); process.exit(1); }
          const ver=v[1];
          console.log('user.js version', ver);
          console.log('package.json version', pkg.version);
          if(pkg.version!==ver){ console.error('package.json mismatch'); process.exit(1); }
          const start=user.indexOf('// ==UserScript==');
          const end=user.indexOf('// ==/UserScript==')+'// ==/UserScript=='.length;
          const header=user.slice(start,end).trim();
          if(meta.trim()!==header){ console.error('meta.js not verbatim'); process.exit(1); }
          const desc=user.match(/^\/\/ @description\s+(.+)/m);
          if(!desc || desc[1].length>900){ console.error('description budget fail'); process.exit(1); }
          console.log('meta & packaging OK');
          NODE

      - name: Icon asset check
        run: |
          if [ -f icon.png ]; then
            SIZE=$(stat -c%s icon.png 2>/dev/null || stat -f%z icon.png)
            echo "icon.png present: ${SIZE} bytes"
          else
            echo "icon.png not in repo (ok if served from release asset)"
          fi
          grep -q '^// @icon' yt+.user.js

      - name: Size sanity check
        run: |
          SIZE=$(stat -c%s yt+.user.js 2>/dev/null || stat -f%z yt+.user.js)
          echo "Userscript size: ${SIZE} bytes"
          if [ "$SIZE" -lt 100000 ]; then echo "::warning::small"; fi

      - name: Security audit
        run: |
          npm audit --audit-level=high || echo "::warning::npm audit high"

  test-matrix:
    name: QA Matrix (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run full QA matrix
        run: node tests/run-all.js

  cross-platform:
    name: Cross-Platform (${{ matrix.os }} / Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: |
          node --check yt+.user.js
          node --check yt+.meta.js

      - name: Run QA matrix
        run: node tests/run-all.js

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [validate, test-matrix, cross-platform]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "validate: ${{ needs.validate.result }}"
          echo "test-matrix: ${{ needs.test-matrix.result }}"
          echo "cross-platform: ${{ needs.cross-platform.result }}"
          if [ "${{ needs.validate.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.test-matrix.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.cross-platform.result }}" != "success" ]; then exit 1; fi
          echo "All checks green — repository healthy."
